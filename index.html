<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chuva de Letras | Nuvem Mágica - Reflexo Azul Gelo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: black;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', 'Fira Code', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="rainCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('rainCanvas');
            const ctx = canvas.getContext('2d');
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            // ALTURA DO CHÃO FÍSICO
            const GROUND_OFFSET_FROM_BOTTOM = 70;
            let groundY;
            
            // Configurações da nuvem - reduzida 15%
            const cloudConfig = {
                x: width / 2,
                y: 100,
                width: 238,
                height: 119,
                blur: 4
            };
            
            let fallingChars = [];
            let splashes = [];
            let reflections = [];
            
            // Pool de objetos para performance
            const SPLASH_POOL_SIZE = 300;
            let splashPool = [];
            let activeSplashes = [];
            
            const REFLECTION_POOL_SIZE = 150;
            let reflectionPool = [];
            let activeReflections = [];
            
            // Inicializa pools
            for (let i = 0; i < SPLASH_POOL_SIZE; i++) {
                splashPool.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, decay: 0, size: 0 });
            }
            for (let i = 0; i < REFLECTION_POOL_SIZE; i++) {
                reflectionPool.push({ active: false, char: '', x: 0, y: 0, life: 0, decay: 0, offsetWave: 0, glowIntensity: 0 });
            }
            
            const GEN_INTERVAL_FRAMES = 2;
            let frameCounter = 0;
            
            const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*+-=?:;";
            
            function getRandomChar() {
                return charset[Math.floor(Math.random() * charset.length)];
            }
            
            const INITIAL_SPEED = 0.8;
            const GRAVITY = 0.28;
            
            class FallingChar {
                constructor(x, y, char) {
                    this.x = x;
                    this.y = y;
                    this.char = char;
                    this.speed = INITIAL_SPEED;
                    this.gravity = GRAVITY;
                    
                    this.trailY = [y, y, y, y, y];
                    this.trailAlpha = [0.8, 0.6, 0.4, 0.25, 0.12];
                    this.trailIndex = 0;
                    this.startY = y;
                }
                
                update() {
                    this.speed += this.gravity;
                    this.y += this.speed;
                    
                    this.trailIndex = (this.trailIndex + 1) % this.trailY.length;
                    this.trailY[this.trailIndex] = this.y;
                }
                
                getOpacity() {
                    const totalDistance = groundY - this.startY;
                    const distanceTraveled = this.y - this.startY;
                    let opacity = 1.0 - (distanceTraveled / totalDistance) * 0.75;
                    opacity = Math.max(0.25, Math.min(1.0, opacity));
                    return opacity;
                }
                
                draw(ctx) {
                    const charCode = this.char;
                    const currentY = this.y;
                    const xPos = this.x - 6;
                    const opacity = this.getOpacity();
                    
                    const mainFontSize = 22;
                    const trailBaseSize = 19;
                    
                    // Desenha rastro
                    for (let i = 0; i < this.trailY.length; i++) {
                        const idx = (this.trailIndex - i + this.trailY.length) % this.trailY.length;
                        const trailYPos = this.trailY[idx];
                        if (trailYPos && trailYPos < currentY + 5) {
                            const trailAlpha = this.trailAlpha[i] * opacity * 0.7;
                            ctx.font = `bold ${trailBaseSize - i * 1.2}px 'Courier New', monospace`;
                            ctx.fillStyle = `rgba(200, 225, 255, ${trailAlpha})`;
                            ctx.fillText(charCode, xPos, trailYPos);
                        }
                    }
                    
                    // Letra principal
                    ctx.font = `bold ${mainFontSize}px 'Fira Code', 'Courier New', monospace`;
                    ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                    ctx.fillText(charCode, xPos, currentY);
                    
                    ctx.fillStyle = `rgba(210, 230, 255, ${opacity * 0.35})`;
                    ctx.fillText(charCode, xPos - 1, currentY - 1);
                }
                
                isOffCanvas() {
                    return this.y - 40 > height;
                }
                
                checkHitGround() {
                    return (this.y + 10) >= groundY;
                }
            }
            
            function createSplash(x, y) {
                for (let i = 0; i < splashPool.length; i++) {
                    const p = splashPool[i];
                    if (!p.active) {
                        p.active = true;
                        p.x = x;
                        p.y = y;
                        p.vx = (Math.random() - 0.5) * 3.5;
                        p.vy = -Math.random() * 5 - 1.8;
                        p.life = 1.0;
                        p.decay = 0.022 + Math.random() * 0.028;
                        p.size = 2.5 + Math.random() * 4;
                        return p;
                    }
                }
                return { active: true, x, y, vx: (Math.random() - 0.5) * 3.5, vy: -Math.random() * 5 - 1.8, life: 1.0, decay: 0.03, size: 3 };
            }
            
            function updateSplash(p) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.28;
                p.life -= p.decay;
                if (p.life <= 0) {
                    p.active = false;
                    return false;
                }
                return true;
            }
            
            function drawSplash(ctx, p) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (0.4 + p.life * 0.6), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 180, 255, ${p.life * 0.85})`;
                ctx.fill();
            }
            
            function createReflection(char, x, groundLevelY) {
                for (let i = 0; i < reflectionPool.length; i++) {
                    const r = reflectionPool[i];
                    if (!r.active) {
                        r.active = true;
                        r.char = char;
                        r.x = x;
                        r.y = groundLevelY + 12;
                        r.life = 1.0;
                        r.decay = 0.038;
                        r.offsetWave = Math.random() * Math.PI * 2;
                        r.glowIntensity = 1.0;
                        return r;
                    }
                }
                return { active: true, char, x, y: groundLevelY + 12, life: 1.0, decay: 0.038, offsetWave: Math.random() * Math.PI * 2, glowIntensity: 1.0 };
            }
            
            function updateReflection(r) {
                r.life -= r.decay;
                if (r.life <= 0) {
                    r.active = false;
                    return false;
                }
                return true;
            }
            
            function drawReflection(ctx, r) {
                const alpha = r.life * 0.9;
                const intensity = r.life * 1.2;
                
                // Tamanho da fonte MAIOR
                const fontSize = 34;
                
                ctx.save();
                
                // Camada 1: Glow externo com tom azul gelo
                ctx.shadowBlur = 18;
                ctx.shadowColor = `rgba(80, 180, 255, ${0.7 * intensity})`;
                
                // Camada 2: Brilho principal com cor azul gelo
                ctx.font = `italic ${fontSize}px 'Fira Code', 'Courier New', monospace`;
                ctx.fillStyle = `rgba(100, 200, 255, ${alpha * 0.95})`;
                const waveY = r.y + Math.sin(Date.now() * 0.012 + r.offsetWave) * 1.8;
                ctx.fillText(r.char, r.x - 7, waveY);
                
                // Camada 2: Brilho central mais intenso (sem blur) - azul mais vibrante
                ctx.shadowBlur = 0;
                ctx.font = `italic ${fontSize}px 'Fira Code', 'Courier New', monospace`;
                ctx.fillStyle = `rgba(70, 180, 255, ${alpha * 0.9})`;
                ctx.fillText(r.char, r.x - 7, waveY);
                
                // Camada 3: Efeito de incandescência pulsante - azul gelo pulsante
                const pulse = Math.sin(Date.now() * 0.008) * 0.3 + 0.7;
                ctx.font = `italic ${fontSize - 2}px 'Fira Code', 'Courier New', monospace`;
                ctx.fillStyle = `rgba(120, 210, 255, ${alpha * 0.7 * pulse})`;
                ctx.fillText(r.char, r.x - 6, waveY - 1);
                
                // Camada 4: Reflexo especular (brilho branco azulado no centro)
                ctx.font = `italic ${fontSize - 4}px 'Fira Code', 'Courier New', monospace`;
                ctx.fillStyle = `rgba(200, 235, 255, ${alpha * 0.5 * pulse})`;
                ctx.fillText(r.char, r.x - 5, waveY - 2);
                
                // Camada 5: Sombra para dar profundidade - tom azul escuro
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0, 50, 80, 0.5)";
                ctx.font = `italic ${fontSize}px 'Fira Code', 'Courier New', monospace`;
                ctx.fillStyle = `rgba(30, 80, 120, ${alpha * 0.3})`;
                ctx.fillText(r.char, r.x - 5, waveY + 3);
                
                ctx.restore();
                
                // Efeito de "glow" adicional com círculos de luz azul gelo
                ctx.save();
                ctx.shadowBlur = 0;
                const glowSize = 28 + Math.sin(Date.now() * 0.01 + r.offsetWave) * 4;
                const gradient = ctx.createRadialGradient(r.x, waveY - 8, 2, r.x, waveY - 8, glowSize);
                gradient.addColorStop(0, `rgba(100, 200, 255, ${alpha * 0.3})`);
                gradient.addColorStop(0.5, `rgba(70, 150, 220, ${alpha * 0.15})`);
                gradient.addColorStop(1, `rgba(40, 100, 180, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(r.x + 2, waveY - 10, glowSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            function generateLetterFromCloud() {
                const cloudLeft = cloudConfig.x - cloudConfig.width / 2;
                const randomX = cloudLeft + Math.random() * cloudConfig.width;
                const startY = cloudConfig.y + (Math.random() * 25) - 5;
                const randomChar = getRandomChar();
                const newChar = new FallingChar(randomX, startY, randomChar);
                fallingChars.push(newChar);
                
                if (fallingChars.length > 200) {
                    fallingChars = fallingChars.slice(-160);
                }
            }
            
            function handleCollisions() {
                for (let i = fallingChars.length - 1; i >= 0; i--) {
                    const letter = fallingChars[i];
                    if (letter.checkHitGround()) {
                        const impactX = letter.x;
                        
                        const splashCount = 6 + Math.floor(Math.random() * 6);
                        for (let s = 0; s < splashCount; s++) {
                            const splash = createSplash(impactX + (Math.random() - 0.5) * 12, groundY - 3);
                            if (splash.active) activeSplashes.push(splash);
                        }
                        
                        const reflection = createReflection(letter.char, impactX, groundY);
                        if (reflection.active) activeReflections.push(reflection);
                        
                        fallingChars.splice(i, 1);
                    }
                }
            }
            
            function updateElements() {
                for (let i = 0; i < fallingChars.length; i++) {
                    fallingChars[i].update();
                }
                
                for (let i = fallingChars.length - 1; i >= 0; i--) {
                    if (fallingChars[i].isOffCanvas()) {
                        fallingChars.splice(i, 1);
                    }
                }
                
                for (let i = activeSplashes.length - 1; i >= 0; i--) {
                    const splash = activeSplashes[i];
                    if (!updateSplash(splash)) {
                        activeSplashes.splice(i, 1);
                    }
                }
                
                for (let i = activeReflections.length - 1; i >= 0; i--) {
                    const reflection = activeReflections[i];
                    if (!updateReflection(reflection)) {
                        activeReflections.splice(i, 1);
                    }
                }
            }
            
            function drawCloud() {
                ctx.save();
                
                const centerX = cloudConfig.x;
                const centerY = cloudConfig.y;
                const w = cloudConfig.width;
                const h = cloudConfig.height;
                
                ctx.filter = `blur(${cloudConfig.blur}px)`;
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.98)";
                
                ctx.beginPath();
                ctx.ellipse(centerX, centerY, w * 0.42, h * 0.62, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(centerX - w * 0.38, centerY + 6, w * 0.32, h * 0.58, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(centerX + w * 0.38, centerY + 6, w * 0.32, h * 0.58, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(centerX - w * 0.22, centerY - 16, w * 0.28, h * 0.44, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(centerX + w * 0.22, centerY - 16, w * 0.28, h * 0.44, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(centerX, centerY - 20, w * 0.24, h * 0.38, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.filter = "none";
                
                ctx.restore();
                
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "rgba(255, 255, 245, 0.5)";
                ctx.beginPath();
                ctx.ellipse(centerX - 7, centerY - 4, 10, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(centerX + 10, centerY - 2, 11, 13, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            function drawGround() {
                ctx.save();
                ctx.shadowBlur = 0;
                
                ctx.beginPath();
                ctx.moveTo(0, groundY);
                ctx.lineTo(width, groundY);
                ctx.strokeStyle = "rgba(100, 170, 230, 0.7)";
                ctx.lineWidth = 3;
                ctx.stroke();
                
                const groundGradient = ctx.createLinearGradient(0, groundY - 5, 0, groundY + 8);
                groundGradient.addColorStop(0, "rgba(50, 90, 130, 0.4)");
                groundGradient.addColorStop(1, "rgba(20, 40, 70, 0.6)");
                ctx.fillStyle = groundGradient;
                ctx.fillRect(0, groundY - 4, width, 12);
                
                ctx.beginPath();
                ctx.moveTo(0, groundY - 1);
                ctx.lineTo(width, groundY - 1);
                ctx.strokeStyle = "rgba(150, 200, 255, 0.5)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                ctx.restore();
            }
            
            function drawReflectionsBelowGround() {
                for (let i = 0; i < activeReflections.length; i++) {
                    drawReflection(ctx, activeReflections[i]);
                }
            }
            
            function animate() {
                if (!ctx) return;
                
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, width, height);
                
                drawCloud();
                
                for (let i = 0; i < fallingChars.length; i++) {
                    fallingChars[i].draw(ctx);
                }
                
                for (let i = 0; i < activeSplashes.length; i++) {
                    drawSplash(ctx, activeSplashes[i]);
                }
                
                drawGround();
                drawReflectionsBelowGround();
                
                frameCounter++;
                if (frameCounter >= GEN_INTERVAL_FRAMES) {
                    frameCounter = 0;
                    const genCount = Math.random() > 0.7 ? 2 : 1;
                    for (let i = 0; i < genCount; i++) {
                        if (fallingChars.length < 160) {
                            generateLetterFromCloud();
                        }
                    }
                    if (Math.random() < 0.25 && fallingChars.length < 160) {
                        generateLetterFromCloud();
                    }
                }
                
                handleCollisions();
                updateElements();
                
                requestAnimationFrame(animate);
            }
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                
                groundY = height - GROUND_OFFSET_FROM_BOTTOM;
                if (groundY < height * 0.5) groundY = height * 0.55;
                
                cloudConfig.x = width / 2;
                cloudConfig.y = Math.min(100, height * 0.12);
                
                if (width < 600) {
                    cloudConfig.width = 170;
                    cloudConfig.height = 85;
                } else {
                    cloudConfig.width = 255;
                    cloudConfig.height = 119;
                }
                cloudConfig.blur = 4;
                
                fallingChars = [];
                activeSplashes = [];
                activeReflections = [];
                for (let i = 0; i < splashPool.length; i++) splashPool[i].active = false;
                for (let i = 0; i < reflectionPool.length; i++) reflectionPool[i].active = false;
                frameCounter = 0;
                
                for (let i = 0; i < 12; i++) {
                    setTimeout(() => generateLetterFromCloud(), i * 40);
                }
            }
            
            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            
            resizeCanvas();
            animate();
        })();
    </script>
</body>
</html>
